<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cookie.io — Advanced Notepad</title>
    <meta name="description" content="Advanced notepad with real-time collaboration, folders, and markdown support." />

    <!-- Favicon as inline SVG -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 64 64' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M32 4 C36 4 40 6 43 8 C46 10 50 10 52 12 C56 15 58 19 59 23 C60 27 60 31 59 35 C58 39 56 43 53 46 C50 49 46 51 43 53 C40 55 36 56 32 56 C28 56 24 55 21 53 C18 51 14 49 11 46 C8 43 6 39 5 35 C4 31 4 27 5 23 C6 19 8 15 11 12 C14 9 18 9 21 7 C24 5 28 4 32 4Z' fill='%23f59e0b'/%3E%3Cellipse cx='22' cy='26' rx='4' ry='3.5' fill='%237c3813' opacity='0.85' transform='rotate(-10 22 26)'/%3E%3Cellipse cx='38' cy='24' rx='3.5' ry='3' fill='%237c3813' opacity='0.85' transform='rotate(8 38 24)'/%3E%3Cellipse cx='28' cy='38' rx='4' ry='3' fill='%237c3813' opacity='0.85' transform='rotate(-5 28 38)'/%3E%3Ccircle cx='56' cy='15' r='12' fill='%230a0a0a'/%3E%3C/svg%3E" />

    <!-- Theme color -->
    <meta name="theme-color" content="#f59e0b" />

    <!-- Preconnect fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- Prevent flash of wrong theme -->
    <script>
      (function() {
        var theme = localStorage.getItem('cookie_theme') || 'dark';
        var resolved = theme === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : theme;
        document.documentElement.classList.add(resolved);

        // Apply saved accent color
        try {
          var s = JSON.parse(localStorage.getItem('cookie_settings') || '{}');
          if (s.accentColor) {
            document.documentElement.style.setProperty('--accent', s.accentColor);
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
